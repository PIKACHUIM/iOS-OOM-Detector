name: Build OOM Test Tool

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:

  # ──────────────────────────────────────────
  # Job 1: 构建验证（SwiftUI 版，模拟器）
  # ──────────────────────────────────────────
  build:
    name: 🔨 Build — SwiftUI
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📋 Show Build Environment
        run: |
          xcodebuild -version
          swift --version
          xcodebuild -showsdks | head -20
          echo "Default Xcode path: $(xcode-select -p)"

      - name: 🔨 Build for iOS Simulator
        run: |
          # Use -arch arm64 to prevent x86_64 compilation on Apple Silicon runners
          set -o pipefail
          xcodebuild clean build \
            -project OOMTestTool.xcodeproj \
            -scheme OOMTestTool \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            ARCHS=arm64 \
            VALID_ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            SWIFT_VERSION=5 \
            SWIFT_STRICT_CONCURRENCY=minimal \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS=NO \
            ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS=NO \
            | tee /tmp/build.log || (echo "=== FULL BUILD LOG ===" && cat /tmp/build.log && exit 1)

  # ──────────────────────────────────────────
  # Job 2: SwiftUI 版归档 + IPA（iOS 13+）
  # ──────────────────────────────────────────
  archive-swiftui:
    name: 📦 IPA — SwiftUI (iOS 13+)
    runs-on: macos-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Archive
        run: |
          xcodebuild clean archive \
            -project OOMTestTool.xcodeproj \
            -scheme OOMTestTool \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -archivePath "${{ runner.temp }}/OOMTestTool.xcarchive" \
            ARCHS=arm64 \
            VALID_ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            IPHONEOS_DEPLOYMENT_TARGET=13.0 \
            ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS=NO \
            ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS=NO

      - name: 🔍 Verify MinimumOSVersion
        run: |
          INFO_PLIST="${{ runner.temp }}/OOMTestTool.xcarchive/Products/Applications/OOMTestTool.app/Info.plist"
          echo "📱 MinimumOSVersion:"
          /usr/libexec/PlistBuddy -c "Print :MinimumOSVersion" "$INFO_PLIST" || echo "N/A"

      - name: 📱 Create IPA
        run: |
          IPA_DIR="${{ runner.temp }}/ipa_swiftui"
          mkdir -p "$IPA_DIR/Payload"
          cp -r "${{ runner.temp }}/OOMTestTool.xcarchive/Products/Applications/OOMTestTool.app" "$IPA_DIR/Payload/"
          cd "$IPA_DIR"
          zip -r -9 "OOMTestTool.ipa" Payload/
          echo "✅ SwiftUI IPA created"
          ls -lh "$IPA_DIR/OOMTestTool.ipa"

      - name: 📤 Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: OOMTestTool-SwiftUI-IPA
          path: ${{ runner.temp }}/ipa_swiftui/OOMTestTool.ipa
          retention-days: 30

      - name: 📤 Upload xcarchive
        uses: actions/upload-artifact@v4
        with:
          name: OOMTestTool-SwiftUI-xcarchive
          path: ${{ runner.temp }}/OOMTestTool.xcarchive
          retention-days: 14

