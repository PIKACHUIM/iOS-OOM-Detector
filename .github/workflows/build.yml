name: Build OOM Test Tool

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  PROJECT_NAME: OOMTestTool
  SCHEME: OOMTestTool
  XCODEPROJ: OOMTestTool.xcodeproj

jobs:

  # ──────────────────────────────────────────
  # Job 1: 构建验证（iOS Simulator）
  # ──────────────────────────────────────────
  build-ios:
    name: 🔨 Build iOS
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📋 Show Build Environment
        run: |
          xcodebuild -version
          xcode-select -p
          swift --version

      - name: 🔨 Build for iOS Simulator
        run: |
          xcodebuild build \
            -project "${{ env.XCODEPROJ }}" \
            -scheme "${{ env.SCHEME }}" \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO

  # ──────────────────────────────────────────
  # Job 2: 归档并导出 IPA
  # ──────────────────────────────────────────
  archive:
    name: 📦 Archive & Export IPA
    runs-on: macos-latest
    needs: build-ios
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📋 Show Build Environment
        run: |
          xcodebuild -version
          xcode-select -p

      - name: 📦 Archive for iOS Device
        run: |
          xcodebuild archive \
            -project "${{ env.XCODEPROJ }}" \
            -scheme "${{ env.SCHEME }}" \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -archivePath "${{ runner.temp }}/${{ env.PROJECT_NAME }}.xcarchive" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            ONLY_ACTIVE_ARCH=NO

      - name: 📱 Create unsigned IPA
        run: |
          # 从 xcarchive 中手动打包 IPA（无需签名）
          ARCHIVE_PATH="${{ runner.temp }}/${{ env.PROJECT_NAME }}.xcarchive"
          IPA_DIR="${{ runner.temp }}/ipa_output"
          mkdir -p "$IPA_DIR/Payload"

          # 复制 .app 到 Payload 目录
          cp -r "$ARCHIVE_PATH/Products/Applications/${{ env.PROJECT_NAME }}.app" "$IPA_DIR/Payload/"

          # 打包成 IPA
          cd "$IPA_DIR"
          zip -r -9 "${{ env.PROJECT_NAME }}.ipa" Payload/

          echo "✅ IPA created: $IPA_DIR/${{ env.PROJECT_NAME }}.ipa"
          ls -lh "$IPA_DIR/${{ env.PROJECT_NAME }}.ipa"

      - name: 📤 Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: OOMTestTool-IPA
          path: ${{ runner.temp }}/ipa_output/${{ env.PROJECT_NAME }}.ipa
          retention-days: 30

      - name: 📤 Upload xcarchive
        uses: actions/upload-artifact@v4
        with:
          name: OOMTestTool-xcarchive
          path: ${{ runner.temp }}/${{ env.PROJECT_NAME }}.xcarchive
          retention-days: 14
