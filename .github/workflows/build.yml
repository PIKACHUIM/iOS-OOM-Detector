name: Build OOM Test Tool

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  PROJECT_NAME: OOMTestTool
  SCHEME: OOMTestTool
  XCODEPROJ: OOMTestTool.xcodeproj

jobs:

  # ──────────────────────────────────────────
  # Job 1: 构建（iOS Simulator）
  # ──────────────────────────────────────────
  build-ios:
    name: 🔨 Build iOS
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📋 Show Build Environment
        run: |
          xcodebuild -version
          xcode-select -p
          xcrun simctl list devices available | head -30
          swift --version

      - name: 🔨 Build for iOS Simulator
        run: |
          xcodebuild build \
            -project "${{ env.XCODEPROJ }}" \
            -scheme "${{ env.SCHEME }}" \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO

  # ──────────────────────────────────────────
  # Job 2: 归档（Release Archive）
  # ──────────────────────────────────────────
  archive:
    name: 📦 Archive
    runs-on: macos-latest
    needs: build-ios
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Archive for iOS Simulator
        run: |
          xcodebuild archive \
            -project "${{ env.XCODEPROJ }}" \
            -scheme "${{ env.SCHEME }}" \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Release \
            -archivePath "${{ runner.temp }}/${{ env.PROJECT_NAME }}.xcarchive" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: 📤 Upload Archive Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OOMTestTool-archive
          path: ${{ runner.temp }}/${{ env.PROJECT_NAME }}.xcarchive
          retention-days: 14
